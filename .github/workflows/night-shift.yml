# Night Shift — reusable GitHub Actions workflow
#
# Called by repos that opt into Night Shift. Runs Claude Code with the
# appropriate bundle prompts against the calling repo.
#
# Usage: see github-actions/caller-template.yml for the minimal caller file.
# Docs:  https://github.com/frontkom/night-shift

name: Night Shift

on:
  workflow_call:
    inputs:
      tasks:
        description: >
          Comma-separated task IDs from manifest.yml
          (e.g. "build-planned-features,update-changelog,add-tests,find-bugs")
        type: string
        required: true
      model:
        description: 'Claude model to use'
        type: string
        default: 'claude-opus-4-6'
      max-turns:
        description: 'Maximum conversation turns per run'
        type: number
        default: 100
    secrets:
      ANTHROPIC_API_KEY:
        required: true
      NIGHTSHIFT_REPORT_URL:
        required: false
      SLACK_WEBHOOK_URL:
        required: false

jobs:
  night-shift:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Claude Code
        run: npm i -g @anthropic-ai/claude-code

      - name: Configure git identity
        run: |
          git config user.name "Night Shift[bot]"
          git config user.email "night-shift[bot]@users.noreply.github.com"

      - name: Run Night Shift
        id: run
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          START_TIME=$(date +%s)
          TASKS="${{ inputs.tasks }}"

          OUTPUT=$(claude -p "$(cat <<EOF
          You are running Night Shift — automated nightly maintenance — on this
          repository. The repo is already checked out in the current directory.

          ## Your allowed tasks

          ${TASKS}

          ## Instructions

          Fetch the Night Shift manifest once:
          https://raw.githubusercontent.com/frontkom/night-shift/main/manifest.yml

          Using the manifest, determine which bundles contain at least one of your
          allowed tasks. Then run each applicable bundle **in this order**:

          1. **plans** — fetch and execute
             https://raw.githubusercontent.com/frontkom/night-shift/main/bundles/plans.md
          2. **docs** — fetch and execute
             https://raw.githubusercontent.com/frontkom/night-shift/main/bundles/docs.md
          3. **code-fixes** — fetch and execute
             https://raw.githubusercontent.com/frontkom/night-shift/main/bundles/code-fixes.md
          4. **audits** — fetch and execute
             https://raw.githubusercontent.com/frontkom/night-shift/main/bundles/audits.md

          For each bundle:
          - Intersect the bundle's tasks (from the manifest) with your allowed tasks.
          - If the intersection is empty, skip the bundle entirely.
          - Otherwise, pass allowed_tasks (the intersection) to the bundle prompt
            so each task self-filters.
          - Execute the fetched bundle prompt fully, including commits and PRs.

          Between bundles, return to the default branch with a clean working tree.

          After all bundles complete, append history lines to
          docs/NIGHTSHIFT-HISTORY.md (create the file + directory if needed).
          Follow the format documented in the multi-runner protocol:
          https://raw.githubusercontent.com/frontkom/night-shift/main/bundles/_multi-runner.md

          Honor CLAUDE.md's Night Shift Config section if present.
          If absent, use defaults from the multi-runner protocol.

          ## Final output

          After all work is done, print a markdown summary table as your last output:

          | Bundle | Status | Notes |
          |--------|--------|-------|
          | plans  | ok/silent/skipped/failed | terse description |
          | docs   | ... | ... |
          | code-fixes | ... | ... |
          | audits | ... | ... |

          Include links to any PRs opened.
          EOF
          )" \
            --model "${{ inputs.model }}" \
            --allowedTools "Bash,Read,Write,Edit,Glob,Grep,WebFetch,WebSearch" \
            --max-turns "${{ inputs.max-turns }}")

          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))

          echo "${OUTPUT}"

          # Persist output and duration for reporting and Slack steps
          echo "${OUTPUT}" > /tmp/nightshift-output.txt
          echo "duration=${DURATION}" >> "$GITHUB_OUTPUT"

          # Write summary to GitHub Actions UI
          cat >> "$GITHUB_STEP_SUMMARY" << 'HEADER'
          ## Night Shift Run Summary
          HEADER
          echo "${OUTPUT}" >> "$GITHUB_STEP_SUMMARY"

      - name: Report run results
        if: always() && steps.run.outcome != 'cancelled'
        env:
          NIGHTSHIFT_REPORT_URL: ${{ secrets.NIGHTSHIFT_REPORT_URL }}
        run: |
          OUTPUT=""
          if [ -f /tmp/nightshift-output.txt ]; then
            OUTPUT=$(cat /tmp/nightshift-output.txt)
          fi
          DURATION="${{ steps.run.outputs.duration }}"
          DURATION="${DURATION:-0}"

          # Parse bundle statuses from the summary table (best-effort)
          parse_status() {
            local bundle="$1"
            local status
            status=$(echo "${OUTPUT}" | grep -i "| *${bundle} " | head -1 | sed 's/.*| *[^ ]* *| *\([a-z]*\).*/\1/')
            case "${status}" in
              ok|silent|skipped|failed) echo "${status}" ;;
              *) echo "unknown" ;;
            esac
          }

          # Extract PR URLs linked in the output for a given bundle line
          parse_prs() {
            local bundle="$1"
            local line
            line=$(echo "${OUTPUT}" | grep -i "| *${bundle} " | head -1)
            echo "${line}" | grep -oE 'https://github\.com/[^ )"|]*pull/[0-9]+' | jq -R . | jq -s .
          }

          PLANS_STATUS=$(parse_status "plans")
          DOCS_STATUS=$(parse_status "docs")
          CODEFIXES_STATUS=$(parse_status "code-fixes")
          AUDITS_STATUS=$(parse_status "audits")

          PLANS_PRS=$(parse_prs "plans")
          DOCS_PRS=$(parse_prs "docs")
          CODEFIXES_PRS=$(parse_prs "code-fixes")
          AUDITS_PRS=$(parse_prs "audits")

          # If the run step failed entirely, mark all unknown statuses as failed
          if [ "${{ steps.run.outcome }}" = "failure" ]; then
            for var in PLANS_STATUS DOCS_STATUS CODEFIXES_STATUS AUDITS_STATUS; do
              eval "val=\$$var"
              if [ "$val" = "unknown" ]; then
                eval "$var=failed"
              fi
            done
          fi

          # Build the JSON event
          EVENT=$(jq -n \
            --arg repo "${{ github.repository }}" \
            --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg model "${{ inputs.model }}" \
            --argjson duration "${DURATION}" \
            --arg plans_status "${PLANS_STATUS}" \
            --argjson plans_prs "${PLANS_PRS:-[]}" \
            --arg docs_status "${DOCS_STATUS}" \
            --argjson docs_prs "${DOCS_PRS:-[]}" \
            --arg codefixes_status "${CODEFIXES_STATUS}" \
            --argjson codefixes_prs "${CODEFIXES_PRS:-[]}" \
            --arg audits_status "${AUDITS_STATUS}" \
            --argjson audits_prs "${AUDITS_PRS:-[]}" \
            '{
              repo: $repo,
              timestamp: $timestamp,
              run_url: $run_url,
              backend: "github-actions",
              bundles: {
                plans:        { status: $plans_status,     prs: $plans_prs,     commits: 0 },
                docs:         { status: $docs_status,      prs: $docs_prs,      commits: 0 },
                "code-fixes": { status: $codefixes_status, prs: $codefixes_prs, commits: 0 },
                audits:       { status: $audits_status,    prs: $audits_prs,    commits: 0 }
              },
              duration_seconds: $duration,
              model: $model
            }')

          # Save as artifact
          mkdir -p /tmp/nightshift-report
          echo "${EVENT}" > /tmp/nightshift-report/event.json
          echo "Report event:"
          cat /tmp/nightshift-report/event.json

          # POST to endpoint if configured
          if [ -n "${NIGHTSHIFT_REPORT_URL}" ]; then
            echo "Posting report to ${NIGHTSHIFT_REPORT_URL}..."
            HTTP_STATUS=$(curl -s -o /tmp/report-response.txt -w "%{http_code}" \
              -X POST \
              -H "Content-Type: application/json" \
              -d "${EVENT}" \
              "${NIGHTSHIFT_REPORT_URL}" \
              --max-time 30) || true
            if [ "${HTTP_STATUS}" -ge 200 ] 2>/dev/null && [ "${HTTP_STATUS}" -lt 300 ] 2>/dev/null; then
              echo "Report posted successfully (HTTP ${HTTP_STATUS})."
            else
              echo "::warning::Failed to post report (HTTP ${HTTP_STATUS}). Response:"
              cat /tmp/report-response.txt 2>/dev/null || true
            fi
          else
            echo "NIGHTSHIFT_REPORT_URL not set — skipping POST."
          fi

      - name: Upload report artifact
        if: always() && steps.run.outcome != 'cancelled'
        uses: actions/upload-artifact@v4
        with:
          name: nightshift-report
          path: /tmp/nightshift-report/event.json
          retention-days: 90

      - name: Notify Slack (success)
        if: success() && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          REPO="${{ github.repository }}"
          REPO_NAME="${REPO#*/}"
          DATE="$(date -u +%Y-%m-%d)"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          OUTPUT=""
          if [ -f /tmp/nightshift-output.txt ]; then
            OUTPUT=$(cat /tmp/nightshift-output.txt)
          fi

          # Count PRs and commits from output
          PR_COUNT=$(echo "${OUTPUT}" | grep -coE 'https://github\.com/[^ )"|]*pull/[0-9]+' || echo "0")
          PR_URLS=$(echo "${OUTPUT}" | grep -oE 'https://github\.com/[^ )"|]*pull/[0-9]+' | head -5 || true)

          # Build a human-friendly summary line
          if [ "${PR_COUNT}" -gt 0 ]; then
            SUMMARY=":white_check_mark: *${PR_COUNT} PRs opened*"
            # Add PR links as bullet points
            PR_LIST=""
            while IFS= read -r url; do
              [ -n "$url" ] && PR_LIST="${PR_LIST}\n  - <${url}>"
            done <<< "${PR_URLS}"
            SUMMARY="${SUMMARY}${PR_LIST}"
          else
            SUMMARY=":white_check_mark: Completed — no changes needed"
          fi

          PAYLOAD=$(jq -n \
            --arg repo "*Night Shift — ${REPO_NAME}*  ·  ${DATE}" \
            --arg summary "${SUMMARY}" \
            --arg run_url "${RUN_URL}" \
            '{
              blocks: [
                {
                  type: "section",
                  text: {
                    type: "mrkdwn",
                    text: ($repo + "\n\n" + $summary)
                  }
                },
                {
                  type: "context",
                  elements: [
                    {
                      type: "mrkdwn",
                      text: ("<" + $run_url + "|View full run>")
                    }
                  ]
                }
              ]
            }')

          curl -sf -X POST -H 'Content-type: application/json' \
            --data "${PAYLOAD}" \
            "${SLACK_WEBHOOK_URL}"

      - name: Notify Slack (failure)
        if: failure() && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          REPO="${{ github.repository }}"
          REPO_NAME="${REPO#*/}"
          DATE="$(date -u +%Y-%m-%d)"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          PAYLOAD=$(jq -n \
            --arg repo "*Night Shift — ${REPO_NAME}*  ·  ${DATE}" \
            --arg run_url "${RUN_URL}" \
            '{
              blocks: [
                {
                  type: "section",
                  text: {
                    type: "mrkdwn",
                    text: ($repo + "\n\n:x: *Run failed*")
                  }
                },
                {
                  type: "context",
                  elements: [
                    {
                      type: "mrkdwn",
                      text: ("<" + $run_url + "|View logs>")
                    }
                  ]
                }
              ]
            }')

          curl -sf -X POST -H 'Content-type: application/json' \
            --data "${PAYLOAD}" \
            "${SLACK_WEBHOOK_URL}"
