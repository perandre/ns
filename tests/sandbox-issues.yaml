# Canonical work-on-issues test scenarios for the sandbox.
#
# Each entry seeds one issue in perandre/night-shift-sandbox, labeled
# "night-shift". The `expect:` field documents what work-on-issues SHOULD
# do — read it after running `/night-shift-test work-on-issues` to assert
# the task's behaviour matches.
#
# How to interpret `expect`:
#   pr_opened              — task should open a PR (title prefix
#                            "night-shift/issue: #<n>") and comment
#                            the PR link back on the issue.
#   skip_complex           — task should post a "reviewed but skipped"
#                            comment because the change spans too many
#                            files / is architectural.
#   skip_infra             — task should post a "reviewed but skipped"
#                            comment because there are no code changes
#                            to make (ops/infra-only work).
#   failed_verification    — task should attempt the change, hit a
#                            failing test/build, revert, and post a
#                            "implementation failed verification"
#                            comment.
#   skip_recently_triaged  — issue already carries a Night Shift
#                            comment from <7 days ago. Task should
#                            silently no-op (no new comment).
#   already_pr             — issue already has an open PR matching
#                            "night-shift/issue: #<n>" in the title.
#                            Task should silently skip.
#
# Process budget: the task processes the oldest 3 in-scope issues per
# run (skip-recently-triaged + already_pr issues are filtered before the
# cap). Order matters here — issues are seeded top-to-bottom, oldest
# first.

issues:
  - title: "Add result count above search results list"
    body: |
      When the search page returns results, render a count line like
      "12 results found" above the list. For zero results, show a
      friendly message instead. Single component change in
      `src/components/SearchResults.tsx`.
    expect: pr_opened

  - title: "Extract sendEmail() into a shared helper"
    body: |
      `src/lib/email.ts` and `src/api/notify.ts` both inline SparkPost
      fetch calls. Lift the shared logic into `src/lib/sendEmail.ts`
      and update both callers. ~3 files; mechanical extraction.
    expect: pr_opened

  - title: "Rewrite the auth + permissions layer to use OAuth 2.1 with PKCE"
    body: |
      We need to replace the current cookie-based session with a full
      OAuth 2.1 + PKCE flow. This will touch every protected route,
      every server action, the middleware, the database session
      schema, the login + signup + reset-password pages, and every
      e2e test. Probably 40–60 files. Architectural decision needed
      on whether to keep the legacy cookie fallback.
    expect: skip_complex

  - title: "Remove deprecated FOO_LEGACY env var from Vercel and GitHub Actions"
    body: |
      The `FOO_LEGACY` env var was retired in last week's migration.
      It still exists in:
        - Vercel project settings (production + preview)
        - GitHub Actions repository secrets
      No code references remain. Delete it from both places via
      `vercel env rm FOO_LEGACY` and `gh secret delete FOO_LEGACY`.
    expect: skip_infra

  - title: "Add a unit test for impossibleDivide(10, 0)"
    body: |
      Add a Vitest test in `src/lib/__tests__/math.test.ts` asserting
      that `impossibleDivide(10, 0)` returns the string "infinity".

      Note: the actual implementation in `src/lib/math.ts` throws
      `Error("Division by zero")` and there is no plan to change it.
      This test should fail the build — that is intentional, to
      exercise the failed-verification path of work-on-issues.
    expect: failed_verification

  - title: "Increase footer link contrast to meet WCAG AA"
    body: |
      Footer links currently render at `text-gray-400` on a white
      background — well below 4.5:1. Bump to `text-gray-700`. One
      file: `src/components/Footer.tsx`.
    expect: skip_recently_triaged
    seed_comment: |
      Night Shift reviewed this issue but skipped it — testing the
      "recently triaged" guard. This comment should prevent the task
      from re-evaluating the issue this run.

      ---
      _Generated by [Claude Code](https://claude.ai/code)_

  - title: "Add aria-label to icon-only delete buttons"
    body: |
      The delete buttons in the row actions use a Trash icon with no
      visible text and no `aria-label`. Add `aria-label="Delete"` to
      every `<IconButton>` that wraps a Trash icon.
    expect: already_pr
    seed_pr:
      branch: night-shift/issue-7-aria-label-delete-2026-04-01
      title: "night-shift/issue: #7 — add aria-label to delete buttons"
      body: |
        Closes #7

        ## Plain summary
        Adds aria-label to icon-only delete buttons so screen readers
        announce them. (Test fixture for already-open-PR de-dup.)
